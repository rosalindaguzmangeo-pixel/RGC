<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Flipbook fullscreen + zoom</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: sans-serif;
    }

    /* Pantalla completa */
    #viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* Capa para zoom y movimiento */
    #zoom-layer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      will-change: transform;
      touch-action: none;
      cursor: grab;
    }

    #zoom-layer.dragging {
      cursor: grabbing;
    }

    /* El flipbook YA NO ocupa toda la pantalla directamente */
    #flipbook {
      width: 100%;
      height: 100%;
    }

    .stf__parent,
    .stf__wrapper {
      width: 100% !important;
      height: 100% !important;
    }

    #resetZoomBtn {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 9999;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    #resetZoomBtn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="zoom-layer">
      <div id="flipbook"></div>
    </div>

    <button id="resetZoomBtn" type="button">Reset zoom</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

  <script>
    const pages = [
      "Boletin/Diapositiva1.JPG",
      "Boletin/Diapositiva2.JPG",
      "Boletin/Diapositiva3.JPG",
      "Boletin/Diapositiva4.JPG",
      "Boletin/Diapositiva5.JPG",
      "Boletin/Diapositiva6.JPG",
    ];

    const flipbookElement = document.getElementById("flipbook");
    const viewer = document.getElementById("viewer");
    const zoomLayer = document.getElementById("zoom-layer");
    const resetZoomBtn = document.getElementById("resetZoomBtn");

    let pageFlip = null;

    // Tamaño base de UNA sola página vertical
    const PAGE_WIDTH = 1000;
    const PAGE_HEIGHT = 1414;
    const PAGE_RATIO = PAGE_WIDTH / PAGE_HEIGHT;

    function getSinglePageSize() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      // Ajustar siempre como página vertical única
      let width = vh * PAGE_RATIO;
      let height = vh;

      if (width > vw) {
        width = vw;
        height = vw / PAGE_RATIO;
      }

      return {
        width: Math.round(width),
        height: Math.round(height)
      };
    }

    function createFlipbook() {
      const size = getSinglePageSize();

      // El libro visible mantiene proporción vertical de una sola página
      zoomLayer.style.width = size.width + "px";
      zoomLayer.style.height = size.height + "px";

      if (pageFlip) {
        pageFlip.destroy();
        flipbookElement.innerHTML = "";
      }

      pageFlip = new St.PageFlip(flipbookElement, {
        width: PAGE_WIDTH,
        height: PAGE_HEIGHT,
        size: "stretch",
        minWidth: PAGE_WIDTH,
        maxWidth: PAGE_WIDTH,
        minHeight: PAGE_HEIGHT,
        maxHeight: PAGE_HEIGHT,
        usePortrait: true,
        autoSize: false,
        showCover: false,
        mobileScrollSupport: false,
        flippingTime: 800,
        maxShadowOpacity: 0.25,
        swipeDistance: 30,
        clickEventForward: true,
        useMouseEvents: true,
        disableFlipByClick: false
      });

      pageFlip.loadFromImages(pages);
    }

    createFlipbook();

    // Navegación con teclado
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") pageFlip.flipNext();
      if (e.key === "ArrowLeft") pageFlip.flipPrev();
    });

    // =========================
    // ZOOM + PAN
    // =========================
    let scale = 1;
    const minScale = 1;
    const maxScale = 4;

    let panX = 0;
    let panY = 0;

    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startPanX = 0;
    let startPanY = 0;

    let pinchStartDistance = 0;
    let pinchStartScale = 1;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getBoundsForScale(nextScale) {
      const baseWidth = zoomLayer.offsetWidth;
      const baseHeight = zoomLayer.offsetHeight;
      const viewerWidth = viewer.clientWidth;
      const viewerHeight = viewer.clientHeight;

      const scaledWidth = baseWidth * nextScale;
      const scaledHeight = baseHeight * nextScale;

      const maxX = Math.max(0, (scaledWidth - viewerWidth) / 2);
      const maxY = Math.max(0, (scaledHeight - viewerHeight) / 2);

      return {
        minX: -maxX,
        maxX: maxX,
        minY: -maxY,
        maxY: maxY
      };
    }

    function applyTransform() {
      const bounds = getBoundsForScale(scale);

      if (scale <= 1) {
        panX = 0;
        panY = 0;
      } else {
        panX = clamp(panX, bounds.minX, bounds.maxX);
        panY = clamp(panY, bounds.minY, bounds.maxY);
      }

      zoomLayer.style.transform =
        `translate(calc(-50% + ${panX}px), calc(-50% + ${panY}px)) scale(${scale})`;
    }

    function zoomTo(newScale) {
      scale = clamp(newScale, minScale, maxScale);
      applyTransform();
    }

    function resetZoom() {
      scale = 1;
      panX = 0;
      panY = 0;
      applyTransform();
    }

    resetZoomBtn.addEventListener("click", resetZoom);
    viewer.addEventListener("dblclick", resetZoom);

    // Zoom con rueda del mouse
    viewer.addEventListener("wheel", (e) => {
      e.preventDefault();
      const delta = -e.deltaY;
      const zoomStep = delta > 0 ? 0.2 : -0.2;
      zoomTo(scale + zoomStep);
    }, { passive: false });

    // Mouse drag
    viewer.addEventListener("mousedown", (e) => {
      if (scale <= 1) return;

      isDragging = true;
      zoomLayer.classList.add("dragging");
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      startPanX = panX;
      startPanY = panY;
      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;

      panX = startPanX + (e.clientX - dragStartX);
      panY = startPanY + (e.clientY - dragStartY);
      applyTransform();
    });

    window.addEventListener("mouseup", () => {
      isDragging = false;
      zoomLayer.classList.remove("dragging");
    });

    function getDistance(t1, t2) {
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      return Math.hypot(dx, dy);
    }

    // Touch start
    viewer.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        pinchStartDistance = getDistance(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
      } else if (e.touches.length === 1 && scale > 1) {
        isDragging = true;
        zoomLayer.classList.add("dragging");
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        startPanX = panX;
        startPanY = panY;
      }
    }, { passive: true });

    // Touch move
    viewer.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();

        const newDistance = getDistance(e.touches[0], e.touches[1]);
        const ratio = newDistance / pinchStartDistance;
        const nextScale = pinchStartScale * ratio;

        zoomTo(nextScale);
        return;
      }

      if (e.touches.length === 1 && isDragging && scale > 1) {
        e.preventDefault();

        panX = startPanX + (e.touches[0].clientX - dragStartX);
        panY = startPanY + (e.touches[0].clientY - dragStartY);
        applyTransform();
      }
    }, { passive: false });

    // Touch end
    viewer.addEventListener("touchend", (e) => {
      if (scale <= 1) {
        isDragging = false;
        zoomLayer.classList.remove("dragging");
        return;
      }

      if (e.touches.length < 2) {
        pinchStartDistance = 0;
      }

      if (e.touches.length === 0) {
        isDragging = false;
        zoomLayer.classList.remove("dragging");
      }
    });

    // Recalcular en resize sin perder página actual
    window.addEventListener("resize", () => {
      const currentPage = pageFlip ? pageFlip.getCurrentPageIndex() : 0;

      createFlipbook();

      if (pageFlip) {
        pageFlip.turnToPage(currentPage);
      }

      applyTransform();
    });

    applyTransform();
  </script>
</body>
</html>
