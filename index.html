<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Flipbook fullscreen + zoom</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: sans-serif;
    }

    /* Área visible completa */
    #viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* Esta capa es la que se amplía y se mueve */
    #zoom-layer {
      position: absolute;
      inset: 0;
      transform-origin: center center;
      transform: translate(0px, 0px) scale(1);
      will-change: transform;
      touch-action: none;
      cursor: grab;
    }

    #zoom-layer.dragging {
      cursor: grabbing;
    }

    /* Flipbook ocupa toda la pantalla */
    #flipbook {
      width: 100vw;
      height: 100vh;
      margin: 0;
    }

    /* Mejor centrado visual */
    .stf__parent,
    .stf__wrapper {
      width: 100% !important;
      height: 100% !important;
    }

    /* Botón opcional para resetear zoom */
    #resetZoomBtn {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 9999;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    #resetZoomBtn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="zoom-layer">
      <div id="flipbook"></div>
    </div>

    <button id="resetZoomBtn" type="button">Reset zoom</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

  <script>
    const flipbookElement = document.getElementById("flipbook");
    const viewer = document.getElementById("viewer");
    const zoomLayer = document.getElementById("zoom-layer");
    const resetZoomBtn = document.getElementById("resetZoomBtn");

    let pageFlip = null;
    let pages = [];

    function imageExists(src) {
      return new Promise((resolve) => {
        const img = new Image();

        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);

        img.src = src;
      });
    }

    async function getPages() {
      const foundPages = [];
      let index = 1;

      while (true) {
        const file = `Boletin/Diapositiva${index}.JPG`;
        const exists = await imageExists(file);

        if (!exists) break;

        foundPages.push(file);
        index++;
      }

      return foundPages;
    }

    async function createFlipbook() {
      if (pageFlip) {
        pageFlip.destroy();
        flipbookElement.innerHTML = "";
      }

      pages = await getPages();

      if (!pages.length) {
        console.error("No se encontraron imágenes en la carpeta Boletin");
        return;
      }

      pageFlip = new St.PageFlip(flipbookElement, {
        width: 1000,
        height: 1414,          // proporción vertical para favorecer una sola página
        size: "stretch",
        minWidth: 280,
        maxWidth: 4000,
        minHeight: 400,
        maxHeight: 4000,
        usePortrait: true,
        autoSize: false,
        showCover: false,
        mobileScrollSupport: false,
        flippingTime: 800,
        maxShadowOpacity: 0.25,
        swipeDistance: 30,
        clickEventForward: true,
        useMouseEvents: true,
        disableFlipByClick: false
      });

      pageFlip.loadFromImages(pages);

      // Forzar modo portrait para mantener 1 página
      pageFlip.on("init", () => {
        forcePortrait();
      });

      pageFlip.on("changeOrientation", () => {
        forcePortrait();
      });
    }

    function forcePortrait() {
      // Algunas versiones aceptan updateState; se mantiene como en tu enfoque previo
      if (pageFlip && typeof pageFlip.updateState === "function") {
        pageFlip.updateState({ orientation: "portrait" });
      }
    }

    createFlipbook();

    // Navegación con teclado
    document.addEventListener("keydown", (e) => {
      if (!pageFlip) return;
      if (e.key === "ArrowRight") pageFlip.flipNext();
      if (e.key === "ArrowLeft") pageFlip.flipPrev();
    });

    // =========================
    // ZOOM + PAN
    // =========================
    let scale = 1;
    const minScale = 1;
    const maxScale = 4;

    let translateX = 0;
    let translateY = 0;

    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startTranslateX = 0;
    let startTranslateY = 0;

    let pinchStartDistance = 0;
    let pinchStartScale = 1;
    let pinchCenter = { x: 0, y: 0 };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getBoundsForScale(nextScale) {
      const rect = viewer.getBoundingClientRect();
      const maxX = ((rect.width * nextScale) - rect.width) / 2;
      const maxY = ((rect.height * nextScale) - rect.height) / 2;
      return {
        minX: -maxX,
        maxX: maxX,
        minY: -maxY,
        maxY: maxY
      };
    }

    function applyTransform() {
      const bounds = getBoundsForScale(scale);

      if (scale <= 1) {
        translateX = 0;
        translateY = 0;
      } else {
        translateX = clamp(translateX, bounds.minX, bounds.maxX);
        translateY = clamp(translateY, bounds.minY, bounds.maxY);
      }

      zoomLayer.style.transform =
        `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function zoomTo(newScale, centerX, centerY) {
      const prevScale = scale;
      scale = clamp(newScale, minScale, maxScale);

      if (scale === prevScale) return;

      const rect = viewer.getBoundingClientRect();

      const cx = centerX - rect.left - rect.width / 2;
      const cy = centerY - rect.top - rect.height / 2;

      const scaleRatio = scale / prevScale;

      translateX = (translateX - cx) * scaleRatio + cx;
      translateY = (translateY - cy) * scaleRatio + cy;

      applyTransform();
    }

    function resetZoom() {
      scale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    resetZoomBtn.addEventListener("click", resetZoom);
    viewer.addEventListener("dblclick", resetZoom);

    // Zoom con rueda del mouse
    viewer.addEventListener("wheel", (e) => {
      e.preventDefault();

      const delta = -e.deltaY;
      const zoomStep = delta > 0 ? 0.2 : -0.2;
      zoomTo(scale + zoomStep, e.clientX, e.clientY);
    }, { passive: false });

    // Mouse drag para mover cuando hay zoom
    viewer.addEventListener("mousedown", (e) => {
      if (scale <= 1) return;

      isDragging = true;
      zoomLayer.classList.add("dragging");
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      startTranslateX = translateX;
      startTranslateY = translateY;
      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;

      translateX = startTranslateX + (e.clientX - dragStartX);
      translateY = startTranslateY + (e.clientY - dragStartY);
      applyTransform();
    });

    window.addEventListener("mouseup", () => {
      isDragging = false;
      zoomLayer.classList.remove("dragging");
    });

    // Touch helpers
    function getDistance(t1, t2) {
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      return Math.hypot(dx, dy);
    }

    function getCenter(t1, t2) {
      return {
        x: (t1.clientX + t2.clientX) / 2,
        y: (t1.clientY + t2.clientY) / 2
      };
    }

    // Touch start
    viewer.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        pinchStartDistance = getDistance(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
        pinchCenter = getCenter(e.touches[0], e.touches[1]);
      } else if (e.touches.length === 1 && scale > 1) {
        isDragging = true;
        zoomLayer.classList.add("dragging");
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        startTranslateX = translateX;
        startTranslateY = translateY;
      }
    }, { passive: true });

    // Touch move
    viewer.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();

        const newDistance = getDistance(e.touches[0], e.touches[1]);
        const ratio = newDistance / pinchStartDistance;
        const nextScale = pinchStartScale * ratio;

        zoomTo(nextScale, pinchCenter.x, pinchCenter.y);
        return;
      }

      if (e.touches.length === 1 && isDragging && scale > 1) {
        e.preventDefault();

        translateX = startTranslateX + (e.touches[0].clientX - dragStartX);
        translateY = startTranslateY + (e.touches[0].clientY - dragStartY);
        applyTransform();
      }
    }, { passive: false });

    // Touch end
    viewer.addEventListener("touchend", (e) => {
      if (scale <= 1) {
        isDragging = false;
        zoomLayer.classList.remove("dragging");
        return;
      }

      if (e.touches && e.touches.length < 2) {
        pinchStartDistance = 0;
      }

      if (!e.touches || e.touches.length === 0) {
        isDragging = false;
        zoomLayer.classList.remove("dragging");
      }
    });

    // Recalcular en resize
    window.addEventListener("resize", () => {
      applyTransform();

      if (pageFlip) {
        createFlipbook();
      }
    });
  </script>
</body>
</html>
