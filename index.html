<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipbook</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #flipbook {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

  <div id="flipbook"></div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

  <script>
    const pages = [
      "Boletin/Diapositiva1.JPG",
      "Boletin/Diapositiva2.JPG",
      "Boletin/Diapositiva3.JPG",
      "Boletin/Diapositiva4.JPG",
      "Boletin/Diapositiva5.JPG",
      "Boletin/Diapositiva6.JPG",
    ];

    const flipbookElement = document.getElementById("flipbook");

    let pageFlip = new St.PageFlip(flipbookElement, {
      width: 380,
      height: 550,
      size: "stretch",          //  evita adaptación a doble página
      usePortrait: true,      //  permite modo 1 página
      autoSize: true,        //  evita cambios automáticos
      showCover: false,
      mobileScrollSupport: false,
      flippingTime: 800
    });

    pageFlip.loadFromImages(pages);

    //  FORZAR SIEMPRE UNA SOLA PÁGINA
    pageFlip.on('init', () => {
      pageFlip.updateState({
        orientation: 'portrait'
      });
    });

    pageFlip.on('changeOrientation', (e) => {
      if (e.data === 'landscape') {
        pageFlip.updateState({
          orientation: 'portrait'
        });
      }
    });

    // navegación con teclado
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") pageFlip.flipNext();
      if (e.key === "ArrowLeft") pageFlip.flipPrev();
    });
  </script>

</body>
</html>
